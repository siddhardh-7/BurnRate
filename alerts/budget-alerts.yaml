# Burnrate SigNoz Alert Rules
# Import via SigNoz UI: Alerts → Import Rules
# Or use the SigNoz API: POST /api/v1/rules

alerts:
  - name: "Burnrate: Budget Burn Rate Critical"
    description: "Total LLM cost burn rate exceeds $5/hour — potential runaway agent"
    severity: "critical"
    condition:
      metric: "burnrate.cost.usd"
      aggregation: "rate"
      operator: ">"
      threshold: 0.0833   # $5/hr = $0.0833/min
      window: "5m"
    annotations:
      summary: "LLM cost burn rate {{ $value | printf \"$%.2f/hr\" }} exceeds $5/hr threshold"
      description: "Check the Burn Rate Live dashboard to identify the spending agent"
    labels:
      severity: critical
      team: platform
    webhook_url: "${COST_GUARD_WEBHOOK_URL}/alert"

  - name: "Burnrate: Per-Agent Cost Anomaly"
    description: "A single agent's cost is 3× its 1-hour baseline — likely a retry loop or model misroute"
    severity: "warning"
    condition:
      metric: "burnrate.cost.usd"
      aggregation: "rate"
      groupBy: ["burnrate.agent.id"]
      operator: ">"
      threshold_multiplier: 3.0
      baseline_window: "1h"
      detection_window: "5m"
    annotations:
      summary: "Agent {{ $labels.burnrate_agent_id }} cost spike: {{ $value | printf \"$%.4f/min\" }}"
    labels:
      severity: warning
    webhook_url: "${COST_GUARD_WEBHOOK_URL}/alert"

  - name: "Burnrate: Cost per Task Spike"
    description: "Individual task cost exceeds $0.50 — single expensive operation"
    severity: "warning"
    condition:
      metric: "burnrate.cost.per_operation.usd"
      aggregation: "max"
      operator: ">"
      threshold: 0.50
      window: "5m"
    annotations:
      summary: "Single operation cost {{ $value | printf \"$%.4f\" }} exceeds $0.50 threshold"
    labels:
      severity: warning
    webhook_url: "${COST_GUARD_WEBHOOK_URL}/alert"

  - name: "Burnrate: Model Misroute Detected"
    description: "Expensive model (opus/sonnet) being used by an agent configured for a cheap model"
    severity: "warning"
    condition:
      metric: "burnrate.cost.usd"
      aggregation: "rate"
      groupBy: ["burnrate.agent.id", "gen_ai.request.model"]
      filter:
        gen_ai.request.model: ["claude-opus-4-8", "claude-sonnet-4-6", "gpt-4o", "o3"]
      operator: ">"
      threshold: 0.01     # $0.01/min from a single model that shouldn't be that expensive
      window: "3m"
    annotations:
      summary: "Agent {{ $labels.burnrate_agent_id }} using expensive model {{ $labels.gen_ai_request_model }}"
    labels:
      severity: warning
    webhook_url: "${COST_GUARD_WEBHOOK_URL}/alert"
