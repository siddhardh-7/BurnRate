[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "burnrate-otel"
version = "0.1.0"
description = "OpenTelemetry cost observability for AI agents — fills the gen_ai.usage.cost.* gap in the OTel GenAI semantic conventions."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.9"
keywords = ["opentelemetry", "llm", "ai-agents", "observability", "finops", "signoz"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "opentelemetry-sdk>=1.24.0",
    "opentelemetry-api>=1.24.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov",
]

[project.urls]
Homepage = "https://github.com/yourusername/burnrate"
Documentation = "https://github.com/yourusername/burnrate#readme"
Issues = "https://github.com/yourusername/burnrate/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/burnrate"]

[tool.pytest.ini_options]
testpaths = ["tests"]
