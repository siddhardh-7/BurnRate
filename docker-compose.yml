version: "3.9"

services:
  demo-app:
    build:
      context: ./demo-app
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      PORT: "8000"
    depends_on: []
    restart: unless-stopped

  cost-guard:
    build:
      context: ./cost-guard
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      PORT: "8080"
    restart: unless-stopped

