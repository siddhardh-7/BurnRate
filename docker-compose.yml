# Burnrate services only — SigNoz is managed separately via:
#   cd pours/deployment && docker compose -f compose.yaml up -d
#
# Both containers join signoz-network (created by pours/deployment) to reach
# the SigNoz ingester, UI, and MCP server by container name.

services:
  # Demo app — researcher-v1 and summarizer-v1 agents
  demo-app:
    build:
      context: .
      dockerfile: demo-app/Dockerfile
    container_name: burnrate-demo-app
    ports:
      - "8001:8001"
    networks:
      - burnrate
      - signoz-network
    environment:
      # SigNoz OTel ingester (signoz-ingester alias, from pours/deployment/compose.yaml)
      OTLP_ENDPOINT: http://signoz-ingester:4317
      OTEL_SERVICE_NAME: demo-app
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-key_not_set}
      SIGNOZ_API_KEY: ${SIGNOZ_API_KEY:-}
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cost Guard — autonomous incident responder
  cost-guard:
    build:
      context: .
      dockerfile: cost-guard/Dockerfile
    container_name: burnrate-cost-guard
    ports:
      - "8082:8082"
    networks:
      - burnrate
      - signoz-network
    environment:
      # SigNoz API + MCP (service names from pours/deployment/compose.yaml)
      SIGNOZ_API_URL: http://signoz-signoz-0:8080
      SIGNOZ_MCP_URL: http://signoz-mcp:8000/mcp
      # SigNoz OTel ingester — Cost Guard ships its incident logs here
      OTLP_ENDPOINT: http://signoz-ingester:4317
      # Demo app throttle target (internal burnrate network)
      DEMO_APP_URL: http://demo-app:8001
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-key_not_set}
      SIGNOZ_API_KEY: ${SIGNOZ_API_KEY:-}
      PORT: "8082"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  burnrate:
    driver: bridge
  # External network created by pours/deployment/compose.yaml — do not recreate
  signoz-network:
    external: true
    name: signoz-network
