version: "3.9"

services:
  demo-app:
    build:
      context: .                      # project root — gives Dockerfile access to packages/burnrate-otel
      dockerfile: demo-app/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      PORT: "8001"
    restart: unless-stopped

  cost-guard:
    build:
      context: ./cost-guard
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    env_file: .env
    environment:
      PORT: "8082"
      DEMO_APP_URL: "http://demo-app:8001"
      # SIGNOZ_MCP_URL and COST_GUARD_MOCK come from .env
    depends_on:
      - demo-app
    restart: unless-stopped

  # Uncomment if using self-hosted SigNoz instead of SigNoz Cloud.
  # Note: configure the alert notification channel webhook URL as
  # http://host.docker.internal:8082/alert (NOT localhost) so SigNoz
  # containers can reach Cost Guard on the host.
